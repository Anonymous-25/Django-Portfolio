<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{Article_data.title}}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>
<link rel="shortcut icon" href="{{ WebSettings_data.favicon }}">
<style>
    :root{
    --bg:#1e1f29;
    --panel:rgba(40,42,54,0.7);
    --border:rgba(255,255,255,0.08);
    --text:#f8f8f2;
    --pink:#ff79c6;
    --purple:#bd93f9;
    --cyan:#8be9fd;
    --green:#50fa7b;
    --orange:#ffb86c;
    --yellow:#f1fa8c;
    --shadow:0 25px 60px rgba(0,0,0,0.6);
    --bittersweet-shimmer: #ff5555;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{
    background-color: var(--bg);
    color:var(--text);
    font-family:system-ui,-apple-system,sans-serif;
    line-height:1.8;
    }
    body{
    background:radial-gradient(circle at top left,#2b2d3a,#1e1f29 60%);
    background-color: var(--bg);
    background-repeat:no-repeat;
    background-position:center;
    background-size:cover;
    background-attachment:fixed;
    }
    body::before{
    background-image:url({{Article_data.background}});
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:-1;
    }
    #progress{
    position:fixed;
    top:0;left:0;
    height:4px;
    width:0%;
    background:linear-gradient(90deg,var(--pink),var(--purple));
    z-index:9999;
    }
    .wrapper{
    display:flex;
    max-width:1400px;
    margin:auto;
    padding:80px 30px;
    gap: 30px;
    }
    .content{
    flex:1;
    max-width:1000px;
    background:var(--panel);
    backdrop-filter:blur(10px);
    border:1px solid var(--border);
    border-radius:20px;
    padding:50px;
    box-shadow:var(--shadow);
    }
    .toc{
    width:260px;
    position: sticky;
    height: fit-content;
    top:80px;
    padding:20px;
    backdrop-filter:blur(1px);
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:15px;
    box-shadow:var(--shadow);
    }
    h1{font-size:42px;margin-bottom:20px;
    background:linear-gradient(90deg,var(--pink),var(--purple));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    h2{margin-top:50px;color:var(--purple); border-bottom: 1px solid var(--border); padding-bottom: 10px;}
    h3{margin-top:30px;color:var(--cyan);}
    h4{margin-top:20px;color:var(--green);}
    h5{margin-top:15px;color:var(--orange);}
    h6{margin-top:10px;color:var(--yellow);}
    p{margin-bottom:18px;margin-top: 10px;}
    a{color:var(--cyan);text-decoration:none;}
    pre{
    background:#111217;
    padding:20px;
    border-radius:12px;
    overflow-x:auto;
    position:relative;
    margin:20px 0;
    }
    code{color:var(--green);}
    .copy{
    position:absolute;
    top:8px;right:8px;
    background:var(--pink);
    border:none;
    color:white;
    padding:4px 10px;
    border-radius:6px;
    cursor:pointer;
    }
    ul{
        margin-left: 30px;
    }
    .toc ul{
        margin-left:20px;
    }
    h2 .span,h3 .span,h4 .span,h5 .span,h6 .span{
    font-size:18px;margin-left:8px;
    opacity:0.7;
    display: none;
    }
    h2:hover .span,h3:hover .span,h4:hover .span,h5:hover .span,h6:hover .span{display: inline;
    }
    table{
    width:100%;
    margin:20px 0;
    border-collapse:collapse;
    border-spacing: 0;
    display:block;
    overflow-x:auto;
    max-width:100%;
    -webkit-overflow-scrolling:touch;
    }
    th,td{
    padding:12px;
    text-align: center;
    border: 1px solid var(--border);
    white-space:nowrap;
    }
    th{color:var(--yellow);}
    .callout{
    padding:15px;
    border-left:4px solid var(--pink);
    background:rgba(255,255,255,0.05);
    border-radius:8px;
    margin:20px 0;
    }
    .callout.error{
    border-left:4px solid var(--bittersweet-shimmer);
    }
    .callout.correct{
    border-left:4px solid var(--green);
    }
    .callout.alert{
    border-left:4px solid var(--yellow);
    }
    .tabs button{
    background:var(--panel);
    border:1px solid var(--border);
    padding:8px 15px;
    margin-top: 20px;
    border-radius: 5px;
    cursor:pointer;
    color:var(--text);
    }
    .tab-content{display:none;padding:15px;background:rgba(255,255,255,0.05);border-radius: 10px;}
    .tab-content.active{display:block;}
    .accordion{
    margin:15px 0;
    cursor:pointer;
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:8px;
    }
    .panel{display:none;padding:10px;}
    .gallery img{
    width:30%;
    margin:1%;
    margin-top: 20px;
    border-radius:10px;
    cursor:pointer;
    max-width: 100%;
    height: auto;
    }
    #lightbox{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index: 10000;
    }
    #lightbox img{max-width:80%;border-radius:10px;}
    #map{height:300px;margin:20px 0;border-radius:12px;}
    canvas{margin:20px 0; max-width: 100%;}
    .toc ul{list-style:none;padding-left: 0px;}
    .toc a{color:var(--cyan);font-size:14px;display:block;margin-bottom:6px;}
    .toc a.active{color:var(--orange);}
    #topBtn{
    position:fixed;
    bottom:20px;right:20px;
    background:var(--pink);
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    z-index: 999;
    }
    @media(max-width:1100px){
        .wrapper {
            flex-direction: column;
            padding: 60px 20px;
        }
        .toc {
            display: none;
            width: 100%;
            position: relative;
            top: 0;
            margin-bottom: 20px;
        }
        .toc.mobile-visible {
            display: block;
        }
        .content {
            padding: 30px;
        }
        h1 { font-size: 32px; }
    }
    @media(max-width: 600px) {
        .gallery img { width: 100%; margin: 10px 0; }
        .content { padding: 20px; }
        iframe { width: 100%; }
    }
    .video {
        border-radius: 10px;
        width: 100%;
        height: 400px;
        border-radius: 10px;
        margin-top: 20px;
    }
    .map{
        width:100%;
        height:450px;
        border-radius:10px;
        margin-top: 10px;
    }
    .banner{
        width:100%;
        height:420px;
        object-fit:cover;
        object-position:center;
        border-radius:12px;
        filter:
            brightness(0.75)
            contrast(1.1)
            saturate(1.1);
        box-shadow:
            0 4px 10px rgba(0,0,0,0.12);
        transition: transform .6s ease, filter .6s ease;
    }
    .banner:hover{
        transform:scale(1.02);
        filter:
            brightness(0.85)
            contrast(1.15)
            saturate(1.2);
    }
    img{
        object-fit:cover;
        object-position:center;
        border-radius:12px;
        box-shadow:
            0 4px 10px rgba(0,0,0,0.12);
        transition: transform 0.3s ease;
    }
    img:hover{
        transform:scale(1.02);
    }
    .buts{
        height:40px;
        display:inline-flex;
        gap:10px;
    }
    .like-btn{
     display:inline-flex;
    align-items:center;
    gap:10px;
    height:100%;
    position:relative;
    padding:10px 18px;
    margin-top:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);
    border-radius:12px;
    color:var(--cyan);
    font-weight:500;
    box-shadow:var(--shadow);
    opacity:0.9;
    }
    .like-btn:hover{
    background:linear-gradient(90deg,var(--pink),var(--purple));
    color:#1e1f29;
    transform:translateY(-2px) scale(1.03);
    box-shadow:0 10px 25px rgba(255,121,198,0.4);
    }
    .like-icon{
    width:22px;
    height:22px;
    stroke:var(--pink);
    fill:none;
    transition:all 0.3s ease;
    }
    .like-btn:hover .like-icon{
    stroke:#1e1f29;
    transform:scale(1.1);
    }
    .like-btn span{
    font-size:15px;
    }
    .view-box{
    display:inline-flex;
    align-items:center;
    gap:10px;
    height:100%;
    position:relative;
    padding:10px 18px;
    margin-top:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);
    border-radius:12px;
    color:var(--cyan);
    font-weight:500;
    box-shadow:var(--shadow);
    opacity:0.9;
    cursor:default;
    pointer-events:none;
    }
    .view-icon{
    width:22px;
    height:22px;
    stroke:var(--cyan);
    fill:none;
    }
    .view-box:hover{
    transform:scale(1.02);
    }
    .tag{
    display:inline-block;
    padding:3px 14px;
    margin:0px 6px 4px 0;
    font-size:13px;
    font-weight:500;
    border-radius:10px;
    background:var(--bg);
    color:var(--pink);
    border:1px solid rgba(255,121,198,0.4);
    backdrop-filter:blur(6px);
    cursor:pointer;
    transition:all 0.3s ease;
    }
    .tag:hover{
    background:var(--pink);
    color:#1e1f29;
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(255,121,198,0.4);
    }
    .toc a.active{
    color:var(--orange);
    font-weight:600;
    }
    .toc ul ul{
    margin-left:14px;
    border-left:1px solid var(--border);
    padding-left:10px;
    }
    #tocSidebar > div{
    height:calc(100vh - 180px);
    overflow-y:auto;
    padding-right:6px;
    }
    #tocSidebar > div{
    scroll-behavior:smooth;
    }
    #tocSidebar > div::-webkit-scrollbar{
    width:6px;
    }
    #tocSidebar > div::-webkit-scrollbar-track{
    background:transparent;
    }
    #tocSidebar > div::-webkit-scrollbar-thumb{
    background:#6272A4;
    border-radius:6px;
    }
    #tocSidebar ul li{
    margin-bottom:6px;
    }
    #tocSidebar ul ul{
    margin-top:4px;
    margin-bottom:6px;
    padding-left:12px;
    border-left:1px solid var(--border);
    }
    #tocSidebar a:hover{
    color:var(--pink);
    }
    @media (max-width:768px){
    body{
    background-position:65% center;
    background-size:cover;
    background-attachment:scroll;
    }
    }
</style>
</head>
<body>
<div id="progress"></div>
<button id="topBtn">Top</button>
<div class="wrapper">
<div class="content">
<img class="banner" src="{{Article_data.article_background}}" alt="{{Article_data.title}}">
<h1>{{Article_data.title}}</h1>
<div class="buts">
    <a href="/like/{{ Article_data.id }}/" class="like-btn">
        <svg xmlns="http://www.w3.org/2000/svg" class="like-icon" viewBox="0 0 24 24">
            <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
        </svg>
        <span>{{ Article_data.likes }}</span>
    </a>
    <div class="view-box">
        <svg xmlns="http://www.w3.org/2000/svg" class="view-icon" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>{{ Article_data.views }}</span>
    </div>
</div>
{% for tag in Article_data.tags.all %}
    <p class="tag"># {{tag.name}}</p>
{% endfor %}
<p id="reading"></p>
{{ Article_data.content|safe }}
</div>
<aside class="toc" id="tocSidebar">
<a href="/">
<img src="{{WebSettings_data.favicon}}" alt="{{WebSettings_data.title}}" width="150px" style="display:block;margin:0 auto;border-radius:50%;">
<h2 style="text-align:center;margin-top:10px;">{{WebSettings_data.second_name}}</h2></a>
<div style="margin-top:20px;max-width:100%;background:transparent;overflow-y:auto;scrollbar-color:#6272A4 transparent;height:380px;">
    <h4>On this page</h4>
    <ul id="toc"></ul>
</div>
</aside>
<div id="lightbox"></div>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        let words=document.body.innerText.split(/\s+/).length;
        document.getElementById("reading").innerText="Estimated reading time: "+Math.ceil(words/200)+" min";
        window.onscroll=function(){
        let s=document.documentElement.scrollTop;
        let h=document.documentElement.scrollHeight-document.documentElement.clientHeight;
        document.getElementById("progress").style.width=(s/h)*100+"%";
        };
        document.getElementById("topBtn").onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
        document.querySelectorAll(".copy").forEach(btn=>{
        btn.onclick=()=>{
            navigator.clipboard.writeText(btn.nextElementSibling.innerText);
            btn.innerText="Copied!";
            setTimeout(()=>btn.innerText="Copy",1000);
        };
        });
        window.openTab = function(i){
        document.querySelectorAll(".tab-content").forEach((el,index)=>{
            el.classList.toggle("active",index===i);
        });
        };
        const accordion = document.querySelector(".accordion");
        if(accordion){
        accordion.onclick=function(){
        let panel=this.nextElementSibling;
        panel.style.display=panel.style.display==="block"?"none":"block";
        };
        }
        document.querySelectorAll(".gallery img").forEach(img=>{
        img.onclick=()=>{
            document.getElementById("lightbox").style.display="flex";
            document.querySelector("#lightbox img").src=img.src;
        };
        });
        document.getElementById("lightbox").onclick=()=>{
            document.getElementById("lightbox").style.display="none";
        };
        const toc = document.getElementById("toc");
        const content = document.querySelector(".content");
        if(toc && content){
        toc.innerHTML = "";
        const headings = content.querySelectorAll("h2, h3");
        let currentH2 = null;
        headings.forEach((heading,index)=>{
        if(!heading.id){
        heading.id = "section-" + index;
        }
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = "#" + heading.id;
        a.textContent = heading.textContent;
        li.appendChild(a);
        if(heading.tagName === "H2"){
        toc.appendChild(li);
        currentH2 = li;
        }
        else if(heading.tagName === "H3"){
        if(currentH2){
        let sublist = currentH2.querySelector("ul");
        if(!sublist){
        sublist = document.createElement("ul");
        sublist.style.marginLeft = "12px";
        currentH2.appendChild(sublist);
        }
        sublist.appendChild(li);
        }
        }
        });
        const links = toc.querySelectorAll("a");
        const observer = new IntersectionObserver((entries)=>{
        entries.forEach(entry=>{
        if(entry.isIntersecting){
        links.forEach(link=>link.classList.remove("active"));
        const id = entry.target.id;
        const activeLink = toc.querySelector(`a[href="#${id}"]`);
        if(activeLink){
        activeLink.classList.add("active");
        }
        }
        });
        },{
        rootMargin: "-40% 0px -55% 0px"
        });
        headings.forEach(h=>observer.observe(h));
        }
        new Chart(document.getElementById("chart"),{
        type:'bar',
        data:{labels:["Recon","Exploit","Root"],
        datasets:[{label:"Progress",data:[20,60,100]}]}
        });
        var map=L.map('map').setView([51.505,-0.09],13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([51.505,-0.09]).addTo(map);
        mermaid.initialize({startOnLoad:true});
        renderMathInElement(document.body);
    });
</script>
</body>
</html>
